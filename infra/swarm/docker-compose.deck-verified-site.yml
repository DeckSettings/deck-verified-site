# ---------------
# Deck Verified Site
#
#   Deploy stack for Deck Verified Site, including web frontend, backend API,
#   asynchronous task processor, and a Redis cache.
#
# ---------------
# TODO:
#       -
#
# ---------------
# Config (paste into portainer advance env text input):
#
# <config_start>
#   #@ Placement
#   #-  - PLACEMENT_CONSTRAINT_CACHE -
#   #-    Configure a placement constraint for the cache container.
#   PLACEMENT_CONSTRAINT_CACHE=node.hostname==<hostname>
#   #-  - PLACEMENT_CONSTRAINT_TASKS -
#   #-    Configure a placement constraint for the tasks container.
#   PLACEMENT_CONSTRAINT_TASKS=node.platform.os==linux
#   #-  - PLACEMENT_CONSTRAINT_API -
#   #-    Configure a placement constraint for the API container.
#   PLACEMENT_CONSTRAINT_API=node.role==worker
#   #-  - PLACEMENT_CONSTRAINT_WEB -
#   #-    Configure a placement constraint for the web container.
#   PLACEMENT_CONSTRAINT_WEB=node.platform.os==linux
#   #@ Replication
#   #-  - REPLICAS_API -
#   #-    Number of replicas for the backend API service.
#   REPLICAS_API=2
#   #-  - REPLICAS_WEB -
#   #-    Number of replicas for the web frontend service.
#   REPLICAS_WEB=2
#   #-  - REPLICAS_WEB_SSR -
#   #-    Number of replicas for the frontend SSR service.
#   REPLICAS_WEB_SSR=1
#   #@ Node Config
#   #-  - NODE_OPTIONS -
#   #-    Node.js options to pass to the runtime.
#   #-    Set to "--no-network-family-autoselection" to disable "Happy Eyeballs" and force IPv4.
#   #-    This is useful in environments (like Docker Swarm overlay networks) where IPv6 is resolved
#   #-    but has no egress, causing long timeouts as Node.js attempts to connect via IPv6 first.
#   NODE_OPTIONS="--no-network-family-autoselection"
#   #@ Resource Limits
#   #-  - REDIS_MEMLIMIT -
#   #-    Memory limit for the Redis service.
#   REDIS_MEMLIMIT=100M
#   #-  - TASKS_MEMLIMIT -
#   #-    Memory limit for the tasks service.
#   TASKS_MEMLIMIT=200M
#   #-  - API_MEMLIMIT -
#   #-    Memory limit for the API service.
#   API_MEMLIMIT=150M
#   #-  - WEB_SSR_MEMLIMIT -
#   #-    Memory limit for the web SSR service.
#   WEB_SSR_MEMLIMIT=160M
#   #-  - WEB_MEMLIMIT -
#   #-    Memory limit for the web frontend service.
#   WEB_MEMLIMIT=50M
#   #@ SSR Diagnostics
#   #-  - SSR_MEMORY_TELEMETRY_INTERVAL_MS -
#   #-    Emit structured memory telemetry every 30 seconds. Capture one heap snapshot per
#   #-    process when Node RSS reaches 70% of the container limit, retaining the newest 3.
#   #-    Set the snapshot percentage to 0 to disable automatic capture.
#   SSR_MEMORY_TELEMETRY_INTERVAL_MS=30000
#   #-  - SSR_HEAP_SNAPSHOT_RSS_PERCENT -
#   #-    Percent of container limit memory at which to capture heap snapshot.
#   SSR_HEAP_SNAPSHOT_RSS_PERCENT=70
#   #-  - SSR_HEAP_SNAPSHOT_RETAIN_COUNT -
#   #-    Number of heap snapshots to retain.
#   SSR_HEAP_SNAPSHOT_RETAIN_COUNT=3
#   #@ Traefik Config
#   #-  - TRAEFIK_ROUTE_RULE_API -
#   #-    Traefik routing rule for the backend API service.
#   TRAEFIK_ROUTE_RULE_API=Host(`deckverified.games`) && PathPrefix(`/deck-verified/api`)
#   #-  - TRAEFIK_ROUTE_RULE_WEB -
#   #-    Traefik routing rule for the web frontend service.
#   TRAEFIK_ROUTE_RULE_WEB=Host(`deckverified.games`)
#   #@ Container Config
#   #-  - ENVIRONMENT_NAME -
#   #-    Environment name (e.g. production, staging, test).
#   ENVIRONMENT_NAME=test
#   #-  - SENTRY_DSN -
#   #-    Sentry DSN for error reporting.
#   SENTRY_DSN=
#   #-  - SENTRY_ENVIRONMENT -
#   #-    Sentry environment tag.
#   SENTRY_ENVIRONMENT=prod
#   #-  - SENTRY_TRACES_SAMPLE_RATE_TASKS -
#   #-    Sentry traces sample rate for tasks.
#   SENTRY_TRACES_SAMPLE_RATE_TASKS=0.1
#   #-  - SENTRY_PROFILES_SAMPLE_RATE_TASKS -
#   #-    Sentry profiles sample rate for tasks.
#   SENTRY_PROFILES_SAMPLE_RATE_TASKS=0.1
#   #-  - SENTRY_TRACES_SAMPLE_RATE_API -
#   #-    Sentry traces sample rate for API.
#   SENTRY_TRACES_SAMPLE_RATE_API=0.1
#   #-  - SENTRY_PROFILES_SAMPLE_RATE_API -
#   #-    Sentry profiles sample rate for API.
#   SENTRY_PROFILES_SAMPLE_RATE_API=0.1
#   #-  - REDIS_PASSWORD -
#   #-    Password for the Redis cache.
#   REDIS_PASSWORD=password
#   #-  - GITHUB_WORKFLOW_SECRET -
#   #-    An optional secret used to validate GitHub workflow webhook requests. If not set, workflow updates will be disabled.
#   GITHUB_WORKFLOW_SECRET=XXXXXXXXXXX
#   #-  - API_GH_TOKEN -
#   #-    A GitHub token for read access for the api service to the DeckSettings GitHub org/repo API
#   API_GH_TOKEN=XXXXXXXXXXX
#   #-  - TASKS_GH_TOKEN -
#   #-    A GitHub token for read access for the tasks service to the DeckSettings GitHub org/repo API
#   TASKS_GH_TOKEN=XXXXXXXXXXX
#   #-  - GITHUB_APP_CLIENT_ID -
#   #-    GitHub App client ID (optional) for enabling user logins.
#   GITHUB_APP_CLIENT_ID=
#   #-  - GITHUB_APP_CLIENT_SECRET -
#   #-    GitHub App client secret (optional) for enabling user logins.
#   GITHUB_APP_CLIENT_SECRET=
#   #-  - BLOGGER_API_KEY -
#   #-    Blogger API key (optional) used by backend for generating blog posts summarizing game reports.
#   BLOGGER_API_KEY=
#   #-  - ISTHEREANYDEAL_API_KEY -
#   #-    IsThereAnyDeal API key (optional) used for checking game prices.
#   ISTHEREANYDEAL_API_KEY=
#   #-  - DEFAULT_CACHE_TIME -
#   #-    The default time to cache game information. This mostly is used to avoid GitHub rate limiting.
#   DEFAULT_CACHE_TIME=21600
#   #-  - REVERSE_PROXY_COUNT -
#   #-    A count of reverse proxy's that the service is behind
#   REVERSE_PROXY_COUNT=0
#   #-  - DISABLE_RATE_LIMITER -
#   #-    Disable the rate limiter. Should normally be false for production.
#   DISABLE_RATE_LIMITER=true
#   #-  - RUN_SCHEDULED_TASKS_ON_START -
#   #-    Run the scheduled tasks on container start. Should normally be false for production.
#   RUN_SCHEDULED_TASKS_ON_START=true
#   #-  - BASE_URL -
#   #-    The base URL of the site/application.
#   BASE_URL=https://deckverified.games
#   #-  - PUBLIC_WEB_ORIGINS -
#   #-    Comma-separated list of allowed public web origins for auth endpoints (CORS).
#   PUBLIC_WEB_ORIGINS=https://deckverified.games
#   #-  - DV_AUTH_JWT_SECRET -
#   #-    JWT secret for backend user authentication.
#   DV_AUTH_JWT_SECRET=XXXXXXXXXXX
#   #@ Fluentd Logging
#   #-  - FLUENTD_PORT -
#   #-    Host Fluentd listener port used by the Docker logging driver.
#   FLUENTD_PORT=24226
# <config_end>
#
# ---------------
# Setup Script
#
# <script_start>
#   > echo "Nothing to configure for this stack"
# <script_end>
#
# ---------------
---
networks:
  # Use an existing network "swarm-public", shared with other services.
  # This network should be created manually and should be also available to a Traefik service.
  swarm-public:
    external: true
  private-net:
    driver: overlay

volumes:
  redis-cache:
    driver: local
  web-ssr-diagnostics:
    driver: local

services:
  # -- Redis --
  #
  # Redis cache service.
  #
  redis:
    image: redis/redis-stack:latest

    # RESOURCES:
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
      update_config:
        delay: 10s
        order: stop-first
      resources:
        limits:
          memory: ${REDIS_MEMLIMIT:-100M}
      placement:
        constraints:
          - ${PLACEMENT_CONSTRAINT_CACHE:?}

    logging:
      driver: fluentd
      options:
        fluentd-address: '127.0.0.1:${FLUENTD_PORT:-24226}'
        fluentd-request-ack: 'true'
        fluentd-async: 'true'
        fluentd-async-reconnect-interval: '5s'
        mode: 'non-blocking'
        max-buffer-size: '4m'
        tag: 'deck-verified-redis'
        env: 'source_env,source_service,source_version,source_project'

    # NETWORK:
    networks:
      - private-net

    # ENVIRONMENT:
    environment:
      # -- Fluentd Log Driver labels
      source_env: ${ENVIRONMENT_NAME:-test}
      source_project: deck-verified-site
      source_service: deck-verified-redis
      source_version: <GIT_COMMIT_SHORT_SHA>
      # -- Application execution
      REDIS_ARGS: --requirepass ${REDIS_PASSWORD:?} --protected-mode yes

    # VOLUMES:
    volumes:
      - type: volume
        source: redis-cache
        target: /data

  # -- Backend Async Tasks --
  #
  # Backend service for running asynchronous tasks.
  #
  tasks:
    image: ghcr.io/decksettings/deck-verified-api:latest
    user: '1000:1000'
    command: node dist/backend/src/tasks.js

    # RESOURCES:
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
      update_config:
        delay: 10s
        order: stop-first
      resources:
        limits:
          memory: ${TASKS_MEMLIMIT:-200M}
      placement:
        constraints:
          - ${PLACEMENT_CONSTRAINT_TASKS:?}
      labels:
        #### -- Configure logging labels
        # These labels are ignored by Docker Swarm logging. They are retained for non-Swarm tooling.
        - 'source.env=${ENVIRONMENT_NAME:-test}'
        - 'source.project=deck-verified-site'
        - 'source.service=deck-verified-tasks'
        - 'source.version=<GIT_COMMIT_SHORT_SHA>'

    logging:
      driver: fluentd
      options:
        fluentd-address: '127.0.0.1:${FLUENTD_PORT:-24226}'
        fluentd-request-ack: 'true'
        fluentd-async: 'true'
        fluentd-async-reconnect-interval: '5s'
        mode: 'non-blocking'
        max-buffer-size: '4m'
        tag: 'deck-verified-tasks'
        env: 'source_env,source_service,source_version,source_project'

    # NETWORK:
    networks:
      - private-net

    # ENVIRONMENT:
    environment:
      # -- Fluentd Log Driver labels
      source_env: ${ENVIRONMENT_NAME:-test}
      source_project: deck-verified-site
      source_service: deck-verified-tasks
      source_version: <GIT_COMMIT_SHORT_SHA>
      # -- Application execution
      NODE_ENV: production
      NODE_OPTIONS: ${NODE_OPTIONS:-}
      DEFAULT_CACHE_TIME: ${DEFAULT_CACHE_TIME:-21600}
      RUN_SCHEDULED_TASKS_ON_START: ${RUN_SCHEDULED_TASKS_ON_START:-false}
      # -- GitHub token (required to increase rate limits on API calls).
      GH_TOKEN: ${TASKS_GH_TOKEN:?}
      # -- Blogger API key (optional, used for generating blog posts)
      BLOGGER_API_KEY: ${BLOGGER_API_KEY:-}
      # -- Cache Config
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?}
      # -- Sentry
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-test}
      SENTRY_RELEASE: <GIT_COMMIT_SHORT_SHA>
      SENTRY_SERVICE_NAME: deck-verified-tasks
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE_TASKS:-0.1}
      SENTRY_PROFILES_SAMPLE_RATE: ${SENTRY_PROFILES_SAMPLE_RATE_TASKS:-0.1}

  # -- Backend API --
  #
  # Backend API service.
  #
  api:
    image: ghcr.io/decksettings/deck-verified-api:latest
    user: '1000:1000'
    command: npm run serve-no-tasks

    # RESOURCES:
    deploy:
      mode: replicated
      replicas: ${REPLICAS_API:-1}
      restart_policy:
        condition: any
        delay: 10s
      update_config:
        parallelism: 1
        delay: 30s
        order: start-first
      resources:
        limits:
          memory: ${API_MEMLIMIT:-150M}
      placement:
        constraints:
          - ${PLACEMENT_CONSTRAINT_API:?}
      labels:
        #### -- Configure logging labels
        # These labels are ignored by Docker Swarm logging. They are retained for non-Swarm tooling.
        - 'source.env=${ENVIRONMENT_NAME:-test}'
        - 'source.project=deck-verified-site'
        - 'source.service=deck-verified-api'
        - 'source.version=<GIT_COMMIT_SHORT_SHA>'

        #### -- Enable traefik router for this service
        - 'traefik.enable=true'

        #### -- Main Service
        - 'traefik.http.services.deck-verified-api.loadbalancer.server.port=9022'
        - 'traefik.http.services.deck-verified-api.loadbalancer.healthcheck.path=/deck-verified/api/v1/health'
        - 'traefik.http.services.deck-verified-api.loadbalancer.healthcheck.interval=10s'
        - 'traefik.http.routers.deck-verified-api.entrypoints=web'
        # Configure router domain
        - 'traefik.http.routers.deck-verified-api.rule=${TRAEFIK_ROUTE_RULE_API}'
        # Router uses SSL
        - 'traefik.http.routers.deck-verified-api.tls=true'
        # Use the "le" (Let's Encrypt) resolver created below
        - 'traefik.http.routers.deck-verified-api.tls.certresolver=le'
        # Enable middlewares:
        #   - Redirect HTTP -> HTTPS
        - 'traefik.http.routers.deck-verified-api.middlewares=https-redirect'

    logging:
      driver: fluentd
      options:
        fluentd-address: '127.0.0.1:${FLUENTD_PORT:-24226}'
        fluentd-request-ack: 'true'
        fluentd-async: 'true'
        fluentd-async-reconnect-interval: '5s'
        mode: 'non-blocking'
        max-buffer-size: '4m'
        tag: 'deck-verified-api'
        env: 'source_env,source_service,source_version,source_project'

    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--header=User-Agent: Swarm-HealthChecker/1.0',
          '--spider',
          '--no-verbose',
          '--tries=1',
          '--timeout=3',
          'http://127.0.0.1:9022/deck-verified/api/v1/health',
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s

    # NETWORK:
    networks:
      - swarm-public
      - private-net

    # ENVIRONMENT:
    environment:
      # -- Fluentd Log Driver labels
      source_env: ${ENVIRONMENT_NAME:-test}
      source_project: deck-verified-site
      source_service: deck-verified-api
      source_version: <GIT_COMMIT_SHORT_SHA>
      # -- Application execution
      NODE_ENV: production
      NODE_OPTIONS: ${NODE_OPTIONS:-}
      BASE_URL: ${BASE_URL:-}
      DEFAULT_CACHE_TIME: ${DEFAULT_CACHE_TIME:-21600}
      REVERSE_PROXY_COUNT: ${REVERSE_PROXY_COUNT:-0}
      DISABLE_RATE_LIMITER: ${DISABLE_RATE_LIMITER:-false}
      RUN_SCHEDULED_TASKS_ON_START: 'false'
      # -- GitHub Workflow Updates Secret
      GITHUB_WORKFLOW_SECRET: ${GITHUB_WORKFLOW_SECRET:-}
      # -- GitHub token (required to increase rate limits on API calls).
      GH_TOKEN: ${API_GH_TOKEN:?}
      # -- GitHub User Login
      GITHUB_APP_CLIENT_ID: ${GITHUB_APP_CLIENT_ID:-}
      GITHUB_APP_CLIENT_SECRET: ${GITHUB_APP_CLIENT_SECRET:-}
      PUBLIC_WEB_ORIGINS: ${PUBLIC_WEB_ORIGINS:-}
      DV_AUTH_JWT_SECRET: ${DV_AUTH_JWT_SECRET:-}
      # -- Blogger API key (optional, used for generating blog posts)
      BLOGGER_API_KEY: ${BLOGGER_API_KEY:-}
      # -- IsThereAnyDeal API key (optional, used for checking game prices)
      ISTHEREANYDEAL_API_KEY: ${ISTHEREANYDEAL_API_KEY:-}
      # -- Cache Config
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?}
      # -- Sentry
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-test}
      SENTRY_RELEASE: <GIT_COMMIT_SHORT_SHA>
      SENTRY_SERVICE_NAME: deck-verified-api
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE_API:-0.1}
      SENTRY_PROFILES_SAMPLE_RATE: ${SENTRY_PROFILES_SAMPLE_RATE_API:-0.1}

  # -- Frontend SSR --
  #
  # Frontend SSR service.
  #
  web-ssr:
    image: ghcr.io/decksettings/deck-verified-web-ssr:latest

    # RESOURCES:
    deploy:
      mode: replicated
      replicas: ${REPLICAS_WEB_SSR:-1}
      restart_policy:
        condition: any
        delay: 10s
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      resources:
        limits:
          memory: ${WEB_SSR_MEMLIMIT:-160M}
      placement:
        constraints:
          - ${PLACEMENT_CONSTRAINT_API:?}
      labels:
        #### -- Configure logging labels
        # These labels are ignored by Docker Swarm logging. They are retained for non-Swarm tooling.
        - 'source.env=${ENVIRONMENT_NAME:-test}'
        - 'source.project=deck-verified-site'
        - 'source.service=deck-verified-web-ssr'
        - 'source.version=<GIT_COMMIT_SHORT_SHA>'

        #### -- Enable traefik router for this service
        - 'traefik.enable=false'

    logging:
      driver: fluentd
      options:
        fluentd-address: '127.0.0.1:${FLUENTD_PORT:-24226}'
        fluentd-request-ack: 'true'
        fluentd-async: 'true'
        fluentd-async-reconnect-interval: '5s'
        mode: 'non-blocking'
        max-buffer-size: '4m'
        tag: 'deck-verified-web-ssr'
        env: 'source_env,source_service,source_version,source_project'

    # NETWORK:
    networks:
      - private-net

    # ENVIRONMENT:
    environment:
      # -- Fluentd Log Driver labels
      source_env: ${ENVIRONMENT_NAME:-test}
      source_project: deck-verified-site
      source_service: deck-verified-web-ssr
      source_version: <GIT_COMMIT_SHORT_SHA>
      # -- Application execution
      SSR_API_ORIGIN: http://api:9022
      SSR_MEMORY_TELEMETRY_INTERVAL_MS: ${SSR_MEMORY_TELEMETRY_INTERVAL_MS:-30000}
      SSR_HEAP_SNAPSHOT_RSS_PERCENT: ${SSR_HEAP_SNAPSHOT_RSS_PERCENT:-70}
      SSR_HEAP_SNAPSHOT_RETAIN_COUNT: ${SSR_HEAP_SNAPSHOT_RETAIN_COUNT:-3}
      SSR_HEAP_SNAPSHOT_DIR: /diagnostics

    # VOLUMES:
    volumes:
      - type: volume
        source: web-ssr-diagnostics
        target: /diagnostics

  # -- Frontend --
  #
  # Web frontend service.
  #
  web:
    image: ghcr.io/decksettings/deck-verified-web:latest

    # RESOURCES:
    deploy:
      mode: replicated
      replicas: ${REPLICAS_WEB:-1}
      restart_policy:
        condition: any
        delay: 10s
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      resources:
        limits:
          memory: ${WEB_MEMLIMIT:-50M}
      placement:
        constraints:
          - ${PLACEMENT_CONSTRAINT_WEB:?}
      labels:
        #### -- Configure logging labels
        # These labels are ignored by Docker Swarm logging. They are retained for non-Swarm tooling.
        - 'source.env=${ENVIRONMENT_NAME:-test}'
        - 'source.project=deck-verified-site'
        - 'source.service=deck-verified-web'
        - 'source.version=<GIT_COMMIT_SHORT_SHA>'

        #### -- Enable traefik router for this service
        - 'traefik.enable=true'

        #### -- Main Service
        - 'traefik.http.services.deck-verified-web.loadbalancer.server.port=9021'
        - 'traefik.http.services.deck-verified-web.loadbalancer.healthcheck.path=/deck-verified/health'
        - 'traefik.http.services.deck-verified-web.loadbalancer.healthcheck.interval=10s'
        - 'traefik.http.services.deck-verified-web.loadbalancer.healthcheck.timeout=5s'
        - 'traefik.http.routers.deck-verified-web.entrypoints=web'
        # Configure router domain
        - 'traefik.http.routers.deck-verified-web.rule=${TRAEFIK_ROUTE_RULE_WEB}'
        # Router uses SSL
        - 'traefik.http.routers.deck-verified-web.tls=true'
        # Use the "le" (Let's Encrypt) resolver created below
        - 'traefik.http.routers.deck-verified-web.tls.certresolver=le'
        # Enable middlewares:
        #   - Redirect HTTP -> HTTPS
        - 'traefik.http.routers.deck-verified-web.middlewares=https-redirect'

    logging:
      driver: fluentd
      options:
        fluentd-address: '127.0.0.1:${FLUENTD_PORT:-24226}'
        fluentd-request-ack: 'true'
        fluentd-async: 'true'
        fluentd-async-reconnect-interval: '5s'
        mode: 'non-blocking'
        max-buffer-size: '4m'
        tag: 'deck-verified-web'
        env: 'source_env,source_service,source_version,source_project'

    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--spider',
          '-q',
          '-T',
          '3',
          '-U',
          'Swarm-HealthChecker/1.0',
          'http://127.0.0.1:9021/deck-verified/health',
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

    # NETWORK:
    networks:
      - swarm-public
      - private-net

    # ENVIRONMENT:
    environment:
      # -- Fluentd Log Driver labels
      source_env: ${ENVIRONMENT_NAME:-test}
      source_project: deck-verified-site
      source_service: deck-verified-web
      source_version: <GIT_COMMIT_SHORT_SHA>
